syntax = "proto3";


package calculate;

option go_package =  "github.com/dkr290-go-advanced-projects/grpc-go-course/calculator/proto";


service AvgService {
  rpc Avg(stream AvgRequest) returns (AvgResponse);
}

message AvgRequest {
  int32 number = 1; 
}

message AvgResponse {
  double result  = 1;
}
