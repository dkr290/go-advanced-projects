syntax = "proto3";
import "google/protobuf/empty.proto";

option go_package = "github.com/dkr290/go-advanced-projects/protobuf-test/grpc-go-course/blog/proto";

message Blog {
  string id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
}

message BlogId {
  string id = 1;
}


service BlogService {
   rpc CreateBlog (Blog) returns (BlogId);
   rpc ReadBlog (BlogId) returns (Blog);
   rpc UpdateBlog (Blog) returns (google.protobuf.Empty);
   rpc DeleteBlog (BlogId) returns (google.protobuf.Empty);
   rpc ListBlog (google.protobuf.Empty) returns (stream Blog);
}
