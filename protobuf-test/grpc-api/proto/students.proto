syntax = "proto3";

package main;

option go_package = "github.com/dkr290-go-advanced-projects/protobuf-test/grpc-api/proto/gen";

service StudentsService {
  rpc GetStudents(GetStudentsRequest) returns (Students);
  rpc AddStudents(Students) returns (Students);
  rpc UpdateStudents(Students) returns (Students);
  rpc DeleteStudents(StudentIds) returns (DeleteStudentsConfirmation);
}

message GetStudentsRequest {
  Student student = 1;
  repeated SortField sort_by = 2;
  int32 page_number = 3;
  int32 page_size = 4;
}

message SortField {
  string field = 1;
  Order order = 2;
}

enum Order {
  ORDER_ASC_UNSPECIFIED = 0;
  ORDER_DESC = 1;
}

message Student {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string class = 5;
}

message Students {
  repeated Student students = 1;
}

message DeleteStudentsConfirmation {
  string status = 1;
  repeated string deleted_ids = 2;
}

message StudentId {
  string id = 1;
}

message StudentIds {
  repeated Student ids = 1;
}
