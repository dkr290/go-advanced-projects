---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - bcredis.bankingcircle.net
  resources:
  - bcredis
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - bcredis.bankingcircle.net
  resources:
  - bcredis/finalizers
  verbs:
  - update
- apiGroups:
  - bcredis.bankingcircle.net
  resources:
  - bcredis/status
  verbs:
  - get
  - patch
  - update
